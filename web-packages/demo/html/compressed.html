<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>压缩纹理 - demo</title>
  <style>
    html, body, div, canvas { margin: 0; padding: 0; }
    body {
      position: relative;
    }
    .container {
      width: 512px;
      height: 512px;
      background-color: rgba(0,0,0,255);
    }
    .controls {
      position: absolute;
      top: 12px;
      left: 100px;
    }
    .controls button {
      padding: 8px 16px;
      font-size: 25px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      color: #070807;
      background-color: #28c672;
    }
    .controls button:hover {
      background-color: #28c672;
    }
    .controls button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }
  </style>
</head>
<body>
<div class="container" id="J-container"></div>
<div class="controls">
  <button id="J-mock-btn">点击模拟不支持KTX2</button>
</div>
<script type="module" src="../src/compressed.ts"></script>
</body>
</html>
